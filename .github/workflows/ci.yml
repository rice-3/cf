name: CI

# PR品質ゲート（詳細設計 §13.4）。
# backend: compile → unit → ArchUnit → integration(Testcontainers)（`gradlew build` が全て実行）
# frontend: typecheck → build
# secret-scan: gitleaks
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      # Gradle Wrapperの改ざん検知（サプライチェーン対策）
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      # CIもAmazon Corretto 25へ統一（技術選定書 §15）
      - name: Set up Amazon Corretto 25
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # `build` が compile / unit / ArchUnit / Testcontainers統合 をまとめて実行する。
      # ubuntu-latest ランナーはDockerが利用可能なため Testcontainers がそのまま動作する。
      - name: Build and test
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/build/reports/tests/
            backend/build/test-results/
          if-no-files-found: ignore

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # contract-first: docs/api/openapi.yaml から型を再生成し、コミット済みと一致するか検証する。
      # spec変更時に `npm run gen:api-types` の実行漏れがあれば失敗する。
      - name: Verify generated API types are up to date
        run: |
          npm run gen:api-types
          git diff --exit-code -- src/lib/generated/api.ts \
            || (echo "::error::生成APIの型が古いです。'npm run gen:api-types' を実行してコミットしてください。"; exit 1)

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
