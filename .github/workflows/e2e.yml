name: E2E

# ブラウザE2E（詳細設計 §14.4）。
# PostgreSQL(サービス) + backend(local profile, java -jar) + frontend(next start) を起動し、
# Playwright で「起案→審査承認」ジャーニーとロール別アクセス制御・運用コンソールを検証する。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: cf_local
          POSTGRES_USER: cf_app
          POSTGRES_PASSWORD: cf_local_password
          TZ: UTC
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cf_app -d cf_local"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      # backend(local profile)を実サービスDBへ向ける（application-local.yml の既定値を上書き）
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/cf_local
      SPRING_DATASOURCE_USERNAME: cf_app
      SPRING_DATASOURCE_PASSWORD: cf_local_password
      BACKEND_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4

      - name: Set up Amazon Corretto 25
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build backend jar
        working-directory: backend
        run: ./gradlew bootJar --no-daemon --stacktrace

      - name: Start backend (local profile)
        working-directory: backend
        run: |
          JAR=$(ls build/libs/*.jar | grep -v plain | head -n1)
          echo "Starting $JAR"
          nohup java -jar "$JAR" --spring.profiles.active=local > backend.log 2>&1 &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || true)
            echo "health=$code (attempt $i)"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 3
          done
          echo "Backend did not become healthy"; tail -n 100 backend/backend.log; exit 1

      - name: Set up Node.js 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore

      - name: Dump backend log on failure
        if: failure()
        run: tail -n 200 backend/backend.log || true
