name: CD (deploy backend to ECS)

# main反映後のデプロイ（詳細設計 §13.3、基本設計 §13.3）。
#
# 【前提】本ワークフローは以下が揃って初めて動作する:
#   - infra/terraform を apply して ECR / ECS / IAM(OIDC) を構築済み（§3.3、terraform定義は提供済み）
#   - リポジトリ Variables: AWS_REGION / AWS_ROLE_ARN / ECR_REPOSITORY /
#     ECS_CLUSTER / ECS_SERVICE / ECS_TASK_FAMILY / CONTAINER_NAME
#     （値は `terraform output` に対応。infra/terraform/README.md 参照）
#
# 上記が未設定のうちは手動起動時に「Check configuration」で早期失敗する（push では起動しない）。
# 自動デプロイではなく手動承認付き（environment）を基本とする（要件 C-17: AI単独の本番反映禁止）。
on:
  workflow_dispatch:
    inputs:
      environment:
        description: デプロイ先環境
        type: choice
        options: [dev, staging]
        default: dev

permissions:
  id-token: write # AWS OIDC
  contents: read

jobs:
  deploy:
    name: Build image & deploy to ECS
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }} # environment側で承認者レビューを必須化できる
    steps:
      - uses: actions/checkout@v4

      - name: Check configuration
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
          ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
          CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
        run: |
          missing=0
          for v in AWS_REGION AWS_ROLE_ARN ECR_REPOSITORY ECS_CLUSTER ECS_SERVICE ECS_TASK_FAMILY CONTAINER_NAME; do
            if [ -z "${!v}" ]; then echo "::error::required variable not set: $v"; missing=1; fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "CD requires Terraform-provisioned AWS infra and repo variables (see workflow header)."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: image
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ vars.ECS_TASK_FAMILY }}" \
            --query taskDefinition > task-definition.json

      - name: Render task definition with new image
        id: taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ vars.CONTAINER_NAME }}
          image: ${{ steps.image.outputs.image }}

      - name: Deploy to ECS (rolling update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.taskdef.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true
