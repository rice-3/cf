name: CodeQL

# 静的セキュリティ解析（詳細設計 §13.4、§14.1 SAST）。
# 注: パブリックリポジトリでは無償。プライベートでは GitHub Advanced Security が必要。
#
# 現状は javascript-typescript（フロントエンド）のみ。
# JVM側（java-kotlin）は、本プロジェクトのKotlin 2.4系がCodeQLのKotlin抽出器で未対応のため
# 一時的に除外している（CODEQL_EXTRACTOR_KOTLIN_ALLOW_UNSUPPORTED_VERSION でも抽出不可）。
# CodeQLがKotlin 2.4へ対応した時点で java-kotlin を追加する（残タスク §2.1）。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 2 * * 1" # 毎週月曜 02:30 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
