name: cf-training

services:
  postgres:
    image: postgres:18
    container_name: cftraining-local-postgres
    environment:
      POSTGRES_DB: cf_local
      POSTGRES_USER: cf_app
      # ローカル専用の開発値。dev以上はSecrets Managerで管理する。
      POSTGRES_PASSWORD: cf_local_password
      TZ: UTC
    ports:
      # ホストに既存のPostgreSQLサービスが5432を使用している場合があるため5433へ割り当てる
      - "5433:5432"
    volumes:
      # postgres:18イメージ以降はメジャーバージョン別ディレクトリ管理のため
      # /var/lib/postgresql（配下にサブディレクトリを作る）へマウントする
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cf_app -d cf_local"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: cftraining-local-mailpit
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP

volumes:
  postgres-data:
