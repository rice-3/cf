# localプロファイル: Docker Compose上のPostgreSQLへ接続（infra/docker-compose.yml）
# ここに記載してよいのはローカル開発専用の値のみ。dev以上はSecrets Manager/SSMで注入する（§11.4）。
spring:
  datasource:
    # ホストに既存のPostgreSQLサービスが5432を使用している場合があるため5433を使う（infra/docker-compose.yml）
    url: jdbc:postgresql://localhost:5433/cf_local
    username: cf_app
    password: cf_local_password
    hikari:
      maximum-pool-size: 10
      connection-timeout: 3000

cf:
  seed:
    dev-users: true # 開発用ユーザーを起動時に投入する（local限定）
